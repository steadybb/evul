<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Login</title>
  <style>
    :root {
      --bg-primary: #1a0a0a;
      --bg-secondary: #2d1414;
      --bg-tertiary: #1f0d0d;
      --text-primary: #ffffff;
      --text-secondary: #e8a8a8;
      --text-muted: #a67777;
      --border: #4a2020;
      --accent: #dc3545;
      --accent-hover: #ff4757;
      --card-radius: 20px;
      --transition: all 0.2s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(rgba(26, 10, 10, 0.92), rgba(26, 10, 10, 0.92)), url('/static/background.jpg') center/cover fixed;
      background-attachment: fixed;
      color: var(--text-primary);
    }
    .card {
      width: min(500px, 100%);
      background: rgba(17, 14, 16, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--card-radius);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.38);
      padding: 34px;
      backdrop-filter: blur(18px);
    }
    .card h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #dc3545 0%, #ff6b6b 100%);
      -webkit-background-clip: text;
      color: transparent;
      background-clip: text;
    }
    .field {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }
    label {
      font-size: 0.95rem;
      color: var(--text-secondary);
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
      outline: none;
      font-size: 1rem;
    }
    input:focus {
      border-color: rgba(220, 53, 69, 0.75);
      box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.16);
    }
    .btn {
      margin-top: 26px;
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: var(--bg-primary);
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 30px rgba(220, 53, 69, 0.24);
    }
    .error {
      margin-top: 16px;
      color: #ff8992;
      font-size: 0.95rem;
    }
    .help {
      margin-top: 12px;
      color: var(--text-secondary);
      font-size: 0.93rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Project Login</h1>
    <p class="help">Enter your credentials to access the dashboard.</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('login', next=request.args.get('next', '')) }}">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn" type="submit">Sign In</button>
    </form>
  </main>
</body>
</html>
